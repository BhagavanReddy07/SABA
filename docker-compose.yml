
services:
  postgres:
    image: postgres:15
    container_name: saba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: saba
      POSTGRES_PASSWORD: saba_password
      POSTGRES_DB: saba
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saba -d saba"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saba-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redisdata:/data
    ports:
      # map to 6380 on host in case 6379 is already used by another service
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.16
    container_name: saba-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "neo4j/neo4j_password"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - neo4jdata:/data
      - neo4jlogs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j_password 'RETURN 1' >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  pgdata:
  redisdata:
  neo4jdata:
  neo4jlogs:
